## Replicaset
#- Create a new Replicaset based on the nginx image with 3 replicas
#- Update the replicas to 4 from the YAML
#- Update the replicas to 6 from the command line

apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: nginx-rs-task
  labels: 
    env: demo 
spec: 
  template: 
    metadata: 
      labels: 
        env: demo
      name: nginx
    spec: 
      containers: 
      - image: nginx 
        name: nginx 
  replicas: 3
  selector: 
    matchLabels: 
      env: demo 


