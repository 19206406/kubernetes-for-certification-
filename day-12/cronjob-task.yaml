apiVersion: batch/v1
kind: CronJob
metadata:
  name: myjob
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: logs-busybox
            image: busybox:1.28
            command:
            - /bin/sh
            - -c
            - date; echo 40daysofkubernetes
          restartPolicy: OnFailure
