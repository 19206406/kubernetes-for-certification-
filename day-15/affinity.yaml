apiVersion: v1
kind: Pod
metadata:
  labels:
    run: redis
  name: redis-3
spec:
  containers:
  - image: redis
    name: redis-3
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  affinity: 
    nodeAffinity: 
      requiredDuringSchedulingIgnoredDuringExecution: # programación utilizada 
        nodeSelectorTerms: # operador de coincidente 
        - matchExpressions:
          - key: disktype
            operator: Exists
status: {}
