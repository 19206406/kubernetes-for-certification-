apiVersion: v1
kind: Pod
metadata:
  labels:
    run: redis
  name: redis-new
spec:
  containers:
  - image: redis
    name: redis-new
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  affinity: 
    nodeAffinity: 
      preferredDuringSchedulingIgnoredDuringExecution: # programación utilizada 
      - weight: 1
        preference: # operador de coincidente 
          matchExpressions:
            - key: disktype
              operator: Exist
status: {}
