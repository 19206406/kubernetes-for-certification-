apiVersion: v1
kind: Pod
metadata: 
  name: myapp-pod
  labels: 
    name: myapp-pod
spec: 
  containers:
  - name: myapp-container
    image: busybox:1.28
    env: 
    - name: FIRSTNAME
      valueFrom: 
        configMapKeyRef:
          name: app-cm
          key: firstname
    command: ['sh', '-c', 'echo the app is runnign && sleep 3600']
