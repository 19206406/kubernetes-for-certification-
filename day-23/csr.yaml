apiVersion: certificates.k8s.io/v1
kind: CertificateSigningRequest
metadata:
  name: sebastian
spec:
  # va el sertificado del nuevo usuario en mi caso es sebas.csr se debe de descodifiar en base64 "cat sebas.csr | base64"
  request: 
  signerName: kubernetes.io/kube-apiserver-client
  expirationSeconds: 2592000 # esto es un mes 
  usages:
    - client auth
